name: Polymarket BTC Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          PAPER_TRADE:    ${{ vars.PAPER_TRADE }}
          BET_SIZE_USD:   ${{ vars.BET_SIZE_USD }}
          POLYMARKET_KEY: ${{ secrets.POLYMARKET_KEY }}
        run: PYTHONPATH=$PYTHONPATH:. python bot/main.py

      - name: Save logs to repo
        run: |
          cp logs/ledger.json docs/ledger.json || true
          cp logs/state.json docs/state.json || true
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/state.json logs/ledger.json logs/bot.log docs/ledger.json docs/state.json
          git diff --staged --quiet || git commit -m "bot: update logs [skip ci]"
          git push || true
